<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eurovision 2026 - Vote</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

        :root {
            --bg-sand: #FDF9F5;
            --surface: #FFFFFF;
            --border: #EADCD1;
            --peach-light: #FBE6DC;
            --peach-main: #ECAE92;
            --brown-light: #D4A373;
            --brown-main: #A87A51;
            --brown-dark: #5B4636;
            --text-main: #4A3A2F;
            --text-muted: #8E7C71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-sand);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        .hidden { display: none !important; }

        header { text-align: center; padding: 25px 15px; margin-bottom: 10px; animation: panDown 0.6s ease-out; }
        h1 { font-size: 1.8rem; letter-spacing: 1px; color: var(--brown-dark); font-weight: 800; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 0 15px; }

        .card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(91, 70, 54, 0.04);
            animation: panUp 0.5s ease-out forwards;
        }

        input[type="text"] {
            width: 100%; max-width: 400px; padding: 15px; border-radius: 12px;
            border: 2px solid var(--border); background: var(--bg-sand);
            color: var(--text-main); font-size: 1.1rem; margin: 20px auto; display: block;
            text-align: center; transition: border-color 0.3s; font-weight: 600;
        }
        input[type="text"]:focus { outline: none; border-color: var(--brown-main); }

        .btn {
            background: var(--brown-main);
            color: white; border: none; padding: 14px 28px; font-size: 1.1rem;
            font-weight: 800; border-radius: 14px; cursor: pointer;
            transition: background 0.2s, transform 0.1s; letter-spacing: 0.5px;
            opacity: 0; animation: panFromSide 0.5s ease-out forwards;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { background: var(--brown-dark); }
        .btn:active { transform: scale(0.96); }
        
        .btn-lang { background: var(--peach-light); color: var(--brown-dark); border: 2px solid var(--peach-main); margin: 10px; width: 100%; max-width: 250px; }
        .btn-lang:hover { background: var(--peach-main); color: white; }

        .tutorial-stage { min-height: 280px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .tut-graphic { font-size: 4rem; margin-bottom: 20px; display: inline-block; }
        .tut-text { font-size: 1.25rem; font-weight: 700; max-width: 550px; line-height: 1.5; margin-bottom: 30px; }
        .tut-nav-row { display: flex; justify-content: center; gap: 15px; width: 100%; max-width: 400px; margin: 0 auto; }
        .btn-tut-nav { flex: 1; padding: 12px; font-weight: 800; border-radius: 12px; cursor: pointer; font-size: 1rem; text-transform: uppercase; }
        .btn-tut-back { background: var(--surface); border: 2px solid var(--border); color: var(--brown-dark); }
        .btn-tut-next { background: var(--peach-main); border: none; color: white; }

        .anim-slide { animation: slidePoints 2.5s infinite ease-in-out; }
        .anim-pulse { animation: pulseIcon 1.5s infinite alternate ease-in-out; }
        .anim-shake { animation: shakeCard 2s infinite ease-in-out; }
        .anim-bounce { animation: bounceBack 1.8s infinite ease-in-out; }

        .workspace { display: flex; flex-direction: column; gap: 20px; }
        
        .status-banner {
            position: sticky; top: 10px; z-index: 100;
            background: var(--surface); border: 2px solid var(--peach-main); border-radius: 16px;
            padding: 12px 20px; text-align: center; color: var(--brown-dark); font-weight: 800; font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(91, 70, 54, 0.04);
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
            animation: panDown 0.5s ease-out;
        }
        .banner-info-chunk { display: flex; align-items: center; gap: 10px; }
        .status-banner span { background: var(--peach-main); padding: 4px 14px; border-radius: 10px; color: white; }
        .btn-back { background: var(--bg-sand); border: 1px solid var(--border); font-size: 0.85rem; padding: 6px 12px; border-radius: 8px; cursor: pointer; color: var(--brown-dark); font-weight: 700; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding-bottom: 20px; }
        
        .country-card {
            background: var(--surface); border: 2px solid var(--border); border-radius: 16px;
            padding: 14px; display: flex; flex-direction: column; gap: 12px;
            opacity: 0; transition: transform 0.2s, border-color 0.2s, opacity 0.3s;
        }
        .country-card.disabled { opacity: 0.3 !important; pointer-events: none; filter: grayscale(70%); }

        .c-header { display: flex; align-items: center; gap: 15px; }
        .flag { width: 44px; height: 32px; object-fit: cover; border-radius: 6px; border: 1px solid rgba(0,0,0,0.1); }
        .c-info { flex-grow: 1; text-align: left; }
        .c-name { font-weight: 800; font-size: 1.15rem; color: var(--brown-dark); line-height: 1.2; }
        .c-song { font-size: 0.9rem; color: var(--text-muted); margin-top: 2px; font-weight: 600; }

        .c-actions { display: flex; gap: 10px; }
        .btn-preview { flex: 1; background: var(--bg-sand); border: 2px solid var(--border); color: var(--brown-dark); border-radius: 10px; padding: 10px; font-weight: 800; font-size: 0.95rem; cursor: pointer; }
        .btn-vote { flex: 2; background: var(--peach-main); color: white; border: none; border-radius: 10px; padding: 10px; font-weight: 800; font-size: 1rem; cursor: pointer; }
        
        .video-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; display: none; background: #000; position: relative; }
        .video-wrap.active { display: block; animation: expandDown 0.3s ease; }
        .video-wrap iframe { width: 100%; height: 100%; border: none; }
        .yt-fallback { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; text-decoration: none; }

        .sidebar { background: var(--surface); border: 2px solid var(--border); border-radius: 20px; padding: 20px; }
        .sidebar h3 { color: var(--brown-main); font-size: 1.1rem; margin-bottom: 15px; text-transform: uppercase; text-align: center; font-weight: 800; letter-spacing: 1px; }
        .slot {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-sand); border: 1px solid var(--border); padding: 8px 12px; border-radius: 12px; margin-bottom: 8px;
            animation: panFromSide 0.4s ease-out backwards;
        }
        .slot-meta { display: flex; align-items: center; gap: 10px; }
        .slot-actions { display: flex; align-items: center; gap: 10px; }
        .slot-pts { background: var(--brown-light); color: white; font-weight: 800; padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; }
        .btn-edit-slot { background: transparent; border: none; color: var(--peach-main); font-weight: 800; font-size: 0.85rem; cursor: pointer; text-decoration: underline; }

        @media (min-width: 768px) {
            .workspace { flex-direction: row; align-items: flex-start; }
            .main-area { flex: 1; height: 80vh; overflow-y: auto; padding-right: 15px; }
            .main-area::-webkit-scrollbar { width: 8px; }
            .main-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
            .sidebar { width: 340px; position: sticky; top: 10px; }
        }

        @keyframes panFromSide { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes panUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes panDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes expandDown { from { opacity: 0; transform: scaleY(0.8); transform-origin: top; } to { opacity: 1; transform: scaleY(1); transform-origin: top; } }
        
        @keyframes slidePoints { 0%, 100% { transform: translateX(-20px); opacity: 0.4; } 50% { transform: translateX(20px); opacity: 1; } }
        @keyframes pulseIcon { from { transform: scale(0.9); filter: drop-shadow(0 0 0 rgba(0,0,0,0)); } to { transform: scale(1.1); filter: drop-shadow(0 4px 10px rgba(236,174,146,0.4)); } }
        @keyframes shakeCard { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-6deg); } 75% { transform: rotate(6deg); } }
        @keyframes bounceBack { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* Pictorial Canvas Container Graphics */
        .pic-canvas {
            width: 100%; max-width: 320px; height: 160px; background: var(--bg-sand);
            border: 2px dashed var(--border); border-radius: 16px; margin-bottom: 25px;
            position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        .seq-box-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 10px;}
        .seq-node { width: 36px; height: 36px; background: var(--surface); border: 2px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--brown-main); }
        .seq-node.active { background: var(--peach-main); border-color: var(--peach-main); color: white; animation: cycleNodes 3s infinite ease-in-out; }
        @keyframes cycleNodes { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); background: var(--brown-main); } }

        .mock-video-card { width: 180px; height: 100px; background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; }
        .mock-play-btn { background: var(--peach-main); border-radius: 6px; height: 24px; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.75rem; font-weight: 800; }
        .mock-play-btn { animation: pulsePlay 1.4s infinite alternate ease-in-out; }
        @keyframes pulsePlay { from { transform: scale(1); background: var(--peach-main); } to { transform: scale(1.04); background: var(--brown-main); } }

        .lock-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .mock-flag-card { padding: 8px 14px; background: var(--surface); border: 2px solid var(--border); border-radius: 10px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .mock-lock-icon { font-size: 1.8rem; animation: lockStamp 2s infinite ease-in-out; }
        @keyframes lockStamp { 0%, 100% { transform: scale(1) rotate(0); opacity: 0.5; } 50% { transform: scale(1.2) rotate(-10deg); opacity: 1; color: var(--peach-main); } }

        .timeline-mock { display: flex; align-items: center; gap: 15px; }
        .arrow-indicator { font-size: 2rem; color: var(--brown-main); animation: arrowPing 1.5s infinite ease-in-out; }
        @keyframes arrowPing { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-10px); color: var(--peach-main); } }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">Eurovision 2026</h1>
    </header>

    <div class="container">
        
        <div id="view-lang" class="card">
            <h2 style="margin-bottom: 25px; color: var(--brown-dark);">Select Language / Wybierz Język</h2>
            <button class="btn btn-lang" style="animation-delay: 0.1s;" onclick="initApp('en')">🇬🇧 English</button>
            <button class="btn btn-lang" style="animation-delay: 0.2s;" onclick="initApp('pl')">🇵🇱 Polski</button>
        </div>
        
        <div id="view-login" class="card hidden">
            <h2 id="login-title" style="margin-bottom: 10px; color: var(--brown-dark);">Voter Setup</h2>
            <p id="login-desc" style="color: var(--text-muted); margin-bottom: 20px;">Enter your name to unlock your scorecard.</p>
            
            <div id="gate-locked" class="hidden">
                <h3 style="color: var(--peach-main); margin-bottom: 10px;">Voting Closed</h3>
                <p style="color: var(--text-muted);">The host has paused submissions.</p>
            </div>

            <div id="gate-open">
                <input type="text" id="voter-name-input" placeholder="Name / Imię">
                <button class="btn" id="btn-enter" style="animation-delay: 0.1s;" onclick="startTutorialWizard()">Start</button>
            </div>
        </div>

        <div id="view-tutorial" class="card hidden">
            <div id="tut-stage-container" class="tutorial-stage"></div>
        </div>

        <div id="view-workspace" class="workspace hidden">
            <div class="main-area">
                <div class="status-banner" id="banner">
                    <div class="banner-info-chunk">
                        <button class="btn-back" id="lbl-back-btn" onclick="stepBackwardTier()">&larr; Back</button>
                        <span id="banner-pts">12</span>
                    </div>
                    <div id="banner-text">Points Allocation</div>
                </div>
                <div id="grid" class="grid"></div>
            </div>
            
            <div class="sidebar">
                <h3 id="side-title">Your Scorecard</h3>
                <div id="slots"></div>
                <div id="submit-area" class="hidden" style="margin-top: 25px; text-align: center;">
                    <button class="btn" style="width: 100%;" id="btn-submit" onclick="submitBallot()">Submit</button>
                </div>
            </div>
        </div>

        <div id="view-success" class="card hidden">
            <div style="font-size: 4rem; margin-bottom: 15px;">🎉</div>
            <h2 id="success-title" style="color: var(--brown-dark); margin-bottom: 10px;">Ballot Sent!</h2>
            <p id="success-desc" style="color: var(--text-muted);">Look at the host screen for the results.</p>
        </div>

    </div>

            { id: "NO", name: "Norway", artist: "JONAS LOVV", song: "YA YA YA", yt: "X-x-N2q22mE", flag: "no" },

            { id: "SR", name: "Serbia", artist: "LAVINA", song: "Kraj Mene", yt: "Z3QY1A1yP4w", flag: "rs" },

        const TIERS = [2, 4, 6, 8, 10, 12];
        const STORE_KEY = "ESC_BALLOTS_26";
        const LOCK_KEY = "ESC_LOCK_26";

        let lang = "en", name = "", tierIdx = 0, ballot = {}, tutorialScreenIdx = 0;

        const i18n = {
            en: {
                logTitle: "Voter Setup", logDesc: "Enter your name to unlock your scorecard.", btnEnter: "Start", errName: "Please enter your name.", errLock: "Voting is locked.", txtAssign: "Assigning", txtPts: "Points", txtPreview: "Preview", txtGive: "Give", txtReview: "Review Ballot", sideTitle: "Your Scorecard", btnSubmit: "Submit Ballot", succTitle: "Ballot Sent!", succDesc: "Look at the host screen for the results.", lblBack: "Back", lblEdit: "Edit",

        function show(id) { document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

        function initApp(l) {
            lang = l; const t = i18n[lang];
            document.getElementById('login-title').innerText = t.logTitle;
            document.getElementById('login-desc').innerText = t.logDesc;
            document.getElementById('btn-enter').innerText = t.btnEnter;
            document.getElementById('side-title').innerText = t.sideTitle;
            document.getElementById('btn-submit').innerText = t.btnSubmit;
            document.getElementById('success-title').innerText = t.succTitle;
            document.getElementById('success-desc').innerText = t.succDesc;
            document.getElementById('lbl-back-btn').innerText = `← ${t.lblBack}`;
            
            show('view-login');
            if (localStorage.getItem(LOCK_KEY) === "true") { document.getElementById('gate-open').classList.add('hidden'); document.getElementById('gate-locked').classList.remove('hidden'); }
        }

        function startTutorialWizard() {
            const input = document.getElementById('voter-name-input').value.trim();
            if(!input) return alert(i18n[lang].errName);
            if(localStorage.getItem(LOCK_KEY) === "true") return alert(i18n[lang].errLock);
            name = input;
            tutorialScreenIdx = 0;
            
            show('view-tutorial');
            renderTutorialScreen();
        }

        function renderTutorialScreen() {
            const t = i18n[lang];
            const currentStep = t.tutSteps[tutorialScreenIdx];
            const targetBox = document.getElementById('tut-stage-container');
            
            const isFirst = tutorialScreenIdx === 0;
            const isLast = tutorialScreenIdx === t.tutSteps.length - 1;

            targetBox.innerHTML = `
                <div class="pic-canvas">
                    ${currentStep.html}
                </div>
                <p class="tut-text">${currentStep.text}</p>
                <div class="tut-nav-row">
                    <button class="btn-tut-nav btn-tut-back ${isFirst ? 'hidden' : ''}" onclick="navigateTutorial(-1)">${t.lblBack}</button>
                    <button class="btn-tut-nav btn-tut-next" onclick="navigateTutorial(1)">${isLast ? t.lblStartVoting : t.lblNext}</button>
                </div>
            `;
        }

        function navigateTutorial(direction) {
            const t = i18n[lang];
            tutorialScreenIdx += direction;

            if (tutorialScreenIdx < 0) {
                tutorialScreenIdx = 0;
            } else if (tutorialScreenIdx >= t.tutSteps.length) {
                engageWorkspace();
            } else {
                renderTutorialScreen();
            }
        }

        function engageWorkspace() {
            document.getElementById('header-title').innerText = name;
            show('view-workspace');
            buildGrid();
        }

        function buildGrid() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            const bannerPts = document.getElementById('banner-pts');
            const bannerText = document.getElementById('banner-text');
            const t = i18n[lang];

            syncSidebarView();

            if(tierIdx >= TIERS.length) {
                bannerPts.innerText = "✓"; bannerText.innerText = t.txtReview;
                grid.innerHTML = `<div class="card" style="margin-top: 20px; width:100%;"><h3 style="color:var(--brown-dark)">Complete! / Gotowe!</h3><p style="color:var(--text-muted); margin-top:5px;">Check your scoreboard card allocations.</p></div>`;
                document.getElementById('submit-area').classList.remove('hidden');
                return;
            }

            document.getElementById('submit-area').classList.add('hidden');
            const pts = TIERS[tierIdx];
            bannerPts.innerText = pts; bannerText.innerText = `${t.txtAssign} ${pts} ${t.txtPts}`;
            
            const used = Object.values(ballot);

            COUNTRIES.forEach((c, i) => {
                const isUsed = used.includes(c.id);
                const card = document.createElement('div');
                card.className = `country-card ${isUsed ? 'disabled' : ''}`;
                card.style.animation = `panFromSide 0.4s ease-out ${i * 0.02}s forwards`;
                
                card.innerHTML = `
                    <div class="c-header">
                        <img src="https://flagcdn.com/w80/${c.flag}.png" class="flag">
                        <div class="c-info">
                            <div class="c-name">${c.name}</div>
                            <div class="c-song">${c.artist}</div>
                        </div>
                    </div>
                    <div class="video-wrap" id="vid-${c.id}"></div>
                    <div class="c-actions">
                        <button class="btn btn-preview" onclick="togVid('${c.id}', '${c.yt}')" style="animation:none; opacity:1;">${t.txtPreview}</button>
                        <button class="btn btn-vote" onclick="vote('${c.id}', ${pts})" style="animation:none; opacity:1;">${t.txtGive} ${pts}</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function togVid(id, yt) {
            const w = document.getElementById(`vid-${id}`);
            if(w.classList.contains('active')) { 
                w.classList.remove('active'); 
                w.innerHTML = ''; 
            } else { 
                w.classList.add('active'); 
                // Removed ?autoplay=1 to fix Error 153. Added target="_blank" fallback.
                w.innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${yt}" allow="fullscreen"></iframe>
                    <a href="https://www.youtube.com/watch?v=${yt}" target="_blank" class="yt-fallback">Watch on YouTube ↗</a>
                `; 
            }
        }

        function vote(cid, pts) {
            ballot[pts] = cid;
            tierIdx = Object.keys(ballot).length;
            buildGrid();
        }

        function stepBackwardTier() {
            if(tierIdx === 0) return;
            tierIdx--;
            const targetPointsValue = TIERS[tierIdx];
            delete ballot[targetPointsValue];
            buildGrid();
        }

        function triggerSlotEdit(targetPoints) {
            const matchIdx = TIERS.indexOf(targetPoints);
            if(matchIdx !== -1) {
                tierIdx = matchIdx;
                for (let i = matchIdx; i < TIERS.length; i++) {
                    delete ballot[TIERS[i]];
                }
                buildGrid();
            }
        }

        function syncSidebarView() {
            const box = document.getElementById('slots');
            box.innerHTML = '';
            const t = i18n[lang];

            TIERS.forEach(pts => {
                const cid = ballot[pts];
                if(cid) {
                    const c = COUNTRIES.find(x => x.id === cid);
                    const el = document.createElement('div');
                    el.className = 'slot';
                    el.innerHTML = `
                        <div class="slot-meta">
                            <img src="https://flagcdn.com/w40/${c.flag}.png" style="width:26px; border-radius:3px; border:1px solid rgba(0,0,0,0.1)">
                            <span style="font-weight:700; font-size:0.9rem; color:var(--brown-dark)">${c.name}</span>
                        </div>
                        <div class="slot-actions">
                            <button class="btn-edit-slot" onclick="triggerSlotEdit(${pts})">${t.lblEdit}</button>
                            <div class="slot-pts">${pts}</div>
                        </div>
                    `;
                    box.appendChild(el);
                }
            });
        }

        function submitBallot() {
            let data = JSON.parse(localStorage.getItem(STORE_KEY) || "[]");
            data = data.filter(b => b.name !== name);
            data.push({ name, ballot });
            localStorage.setItem(STORE_KEY, JSON.stringify(data));
            show('view-success');
        }
    </script>
</body>
</html>
